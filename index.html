<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ASTROCORE PREVIEW - AMINA</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #overlay { position: absolute; top: 20px; left: 20px; color: #00d4ff; pointer-events: none; }
        .controls-hint { position: absolute; bottom: 20px; right: 20px; color: rgba(255,255,255,0.5); font-size: 12px; }
        #nav { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        button { background: rgba(0, 20, 40, 0.7); border: 1px solid #00d4ff; color: #00d4ff; padding: 10px 20px; cursor: pointer; border-radius: 5px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        button:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="overlay">
    <h1>ASTROCORE V3</h1>
    <p>ENGINE: THREE.JS / WEBGL 2.0</p>
</div>

<div id="nav">
    <button onclick="switchTarget('earth')">Earth</button>
    <button onclick="switchTarget('mars')">Mars</button>
    <button onclick="switchTarget('jupiter')">Jupiter</button>
</div>

<div class="controls-hint">SOURIS : ROTATION | MOLETTE : ZOOM</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, sphere, clouds, stars;
    const loader = new THREE.TextureLoader();

    function init() {
        // 1. SCÈNE & CAMÉRA
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        // 2. RENDERER (LE MOTEUR)
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 3. CONTROLES (SOURIS)
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. LUMIÈRES (INDISPENSABLE POUR LE RELIEF)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // 5. ÉTOILES (FOND DE L'ESPACE)
        const starGeometry = new THREE.SphereGeometry(90, 64, 64);
        const starMaterial = new THREE.MeshBasicMaterial({
            map: loader.load('https://i.imgur.com/9nFAtxN.jpg'),
            side: THREE.BackSide
        });
        stars = new THREE.Mesh(starGeometry, starMaterial);
        scene.add(stars);

        // 6. CRÉATION DE LA PLANÈTE
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshStandardMaterial();
        sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // 7. NUAGES (POUR L'EFFET DE PROFONDEUR)
        const cloudGeo = new THREE.SphereGeometry(1.02, 64, 64);
        const cloudMat = new THREE.MeshPhongMaterial({
            map: loader.load('https://i.imgur.com/7YjA2Lp.jpg'),
            transparent: true,
            opacity: 0.4
        });
        clouds = new THREE.Mesh(cloudGeo, cloudMat);
        scene.add(clouds);

        switchTarget('earth');
        animate();
    }

    function switchTarget(planet) {
        const textures = {
            earth: {
                map: 'https://i.imgur.com/S8W75eH.jpg',
                bump: 'https://i.imgur.com/uS3S4U8.jpg' // Simule relief
            },
            mars: {
                map: 'https://i.imgur.com/uS3S4U8.jpg',
                bump: 'https://i.imgur.com/uS3S4U8.jpg'
            },
            jupiter: {
                map: 'https://i.imgur.com/k6lP0Wf.jpg',
                bump: ''
            }
        };

        sphere.material.map = loader.load(textures[planet].map);
        if (textures[planet].bump) {
            sphere.material.bumpMap = loader.load(textures[planet].bump);
            sphere.material.bumpScale = 0.05;
        }
        
        // Cacher les nuages si ce n'est pas la Terre
        clouds.visible = (planet === 'earth');
    }

    function animate() {
        requestAnimationFrame(animate);
        sphere.rotation.y += 0.002;
        clouds.rotation.y += 0.003;
        stars.rotation.y -= 0.0002;
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
